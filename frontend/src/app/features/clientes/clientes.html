<app-drawer [(visible)]="menuAberto" />

<main class="page-container">
  <header class="toolbar">
    <button type="button" class="icon-button" aria-label="Abrir menu" (click)="abrirMenu()">
      <i class="pi pi-bars"></i>
    </button>

    <h1>Clientes</h1>

    <button type="button" class="icon-button add-button" aria-label="Nova cliente" (click)="novoCliente()">
      <i class="pi pi-plus"></i>
    </button>
  </header>

  <section class="search-section">
    <div class="search-box">
      <i class="pi pi-search"></i>

      <input type="text" placeholder="Buscar cliente" [ngModel]="termoBusca()" (ngModelChange)="alterarBusca($event)" />
    </div>
  </section>

  <section class="clients-list">
    @for (cliente of clientesFiltrados(); track cliente.id) {
    <article class="client-card">
      <div class="client-avatar">{{ cliente.iniciais }}</div>

      <div class="client-info">
        <strong>{{ cliente.nomeCompleto }}</strong>

        @if (cliente.apelido) {
        <span>{{ cliente.apelido }}</span>
        }

        <small>{{ cliente.whatsapp }}</small>
      </div>

      <button type="button" class="delete-button" aria-label="Remover cliente" (click)="removerCliente(cliente.id)">
        <i class="pi pi-trash"></i>
      </button>
    </article>
    } @empty {
    <div class="empty-state">
      <i class="pi pi-users"></i>
      <p>Nenhuma cliente encontrada.</p>
    </div>
    }
  </section>
</main>

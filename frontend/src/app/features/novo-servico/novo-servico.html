<main class="page-container">
  <header class="toolbar">
    <button type="button" class="icon-button" aria-label="Voltar" (click)="cancelar()">
      <i class="pi pi-arrow-left"></i>
    </button>

    <h1>@if (modoEdicao()) { Atualizar serviço } @else { Novo serviço }</h1>

    <div class="spacer"></div>
  </header>

  <form [formGroup]="form" (ngSubmit)="salvar()" class="form-layout">
    <p-floatlabel variant="on">
      <input pInputText id="nome" type="text" formControlName="nome" autocomplete="off" />

      <label for="nome">Nome do serviço *</label>
    </p-floatlabel>

    <p-floatlabel variant="on">
      <textarea pTextarea id="descricao" formControlName="descricao" rows="4" autoResize="true"></textarea>

      <label for="descricao">Descrição</label>
    </p-floatlabel>

    <p-floatlabel variant="on">
      <p-select inputId="duracao" formControlName="duracao" [options]="opcoesDuracao()" [editable]="true" />

      <label for="duracao">Duração *</label>
    </p-floatlabel>

    <p-floatlabel variant="on">
      <p-inputnumber inputId="preco" formControlName="preco" mode="currency" currency="BRL" locale="pt-BR" [min]="0" [minFractionDigits]="2" [maxFractionDigits]="2" />

      <label for="preco">Preço *</label>
    </p-floatlabel>

    <div class="actions">
      <button type="submit" class="btn-primary" [disabled]="form.invalid">
        <i class="pi pi-save"></i>

        @if (modoEdicao()) { Atualizar serviço } @else { Cadastrar serviço }
      </button>

      <button type="button" class="btn-ghost" (click)="cancelar()">Cancelar</button>
    </div>
  </form>
</main>

<main class="page-container">
  <header class="toolbar">
    <button type="button" class="icon-button" aria-label="Voltar" (click)="cancelar()">
      <i class="pi pi-arrow-left"></i>
    </button>
    <h1>Novo serviço</h1>
    <div class="spacer"></div>
  </header>

  <section class="header-info">
    <div class="icon-wrapper">
      <i class="pi pi-sparkles"></i>
    </div>
    <div>
      <h2>Cadastrar serviço</h2>
      <p>Defina o nome e a duração estimada para o atendimento.</p>
    </div>
  </section>

  <form [formGroup]="form" (ngSubmit)="salvar()" class="form-layout">
    <div class="input-group">
      <label for="nome">Nome do serviço *</label>
      <input id="nome" type="text" formControlName="nome" class="custom-input" placeholder="Ex.: Banho de gel" />
    </div>

    <div class="input-group">
      <label for="descricao">Descrição (opcional)</label>
      <textarea id="descricao" formControlName="descricao" class="custom-input custom-textarea" rows="3" placeholder="Detalhes sobre o procedimento..."></textarea>
    </div>

    <div class="input-group">
      <label for="duracao">Duração estimada *</label>
      <p-select id="duracao" formControlName="duracao" [options]="opcoesDuracao" placeholder="Selecione o tempo" class="prime-input-override" appendTo="body"> </p-select>
    </div>

    <div class="actions">
      <button type="submit" class="btn-primary" [disabled]="form.invalid">
        <i class="pi pi-save"></i>
        Salvar serviço
      </button>
      <button type="button" class="btn-ghost" (click)="cancelar()">Cancelar</button>
    </div>
  </form>
</main>
